name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      # - name: Install required packages
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y package1 package2 package3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install maturin
        run: |
          pip install maturin psycopg "psycopg[pool]" pgvector \
            "sentence-transformers" "huggingface_hub[cli]"
          pip install -e .
          pip install -e ".[test]" ".[mcp-server]" ".[build]"
      - name: Build module
        run: maturin build --release
